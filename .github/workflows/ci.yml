---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   juniper-data-client
# Application:   juniper_data_client
# File Name:     ci.yml
# Author:        Paul Calnon
# Version:       0.2.0
#
# Date Created:  2026-02-20
# Last Modified: 2026-02-26
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions CI/CD Pipeline for juniper-data-client
#    - Code quality checks (black, isort, flake8, mypy)
#    - Unit tests with coverage enforcement
#    - Security scanning (Bandit, pip-audit)
#    - Build/package verification
#    - Dependency documentation generation
#    - Quality gate aggregator
#
# References:
#    - Modeled after juniper-data CI pipeline
#    - Phase 7.1.4: CI hardening for juniper-data-client
#####################################################################################################################################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_TEST_VERSION: "3.14"
  COVERAGE_FAIL_UNDER: "80"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Lint: Code quality checks (runs across multiple Python versions)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check --diff juniper_data_client tests

      - name: Check imports (isort)
        run: isort --check-only --diff juniper_data_client tests

      - name: Lint (flake8)
        run: flake8 juniper_data_client --max-line-length=512

      - name: Type check (mypy)
        run: mypy juniper_data_client --ignore-missing-imports

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Docs: Validate documentation link integrity
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  docs:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Validate Documentation Links
        run: python scripts/check_doc_links.py --exclude templates --exclude history

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Unit Tests: Run unit tests with coverage enforcement
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests + Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Create required directories
        run: mkdir -p reports/junit reports/htmlcov

      - name: Run Unit Tests
        run: |
          python -m pytest \
            tests/ \
            --verbose \
            --timeout=60 \
            --maxfail=5 \
            --junitxml=reports/junit-unit.xml \
            --cov=juniper_data_client \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov

      - name: Enforce Coverage Gate
        run: python -m coverage report --fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            reports/coverage.xml
            reports/htmlcov/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/junit-unit.xml
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Build sdist and wheel artifacts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: build-artifacts
          path: dist/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Dependency Docs: Generate dependency documentation artifacts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  dependency-docs:
    name: Dependency Documentation
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Set up Conda (Miniforge)
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167  # v3.3.0
        with:
          miniforge-version: latest
          auto-activate-base: true
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Install project dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Generate Dependency Documentation
        shell: bash -l {0}
        run: bash scripts/generate_dep_docs.sh

      - name: Upload Dependency Documentation
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dependency-docs
          path: |
            conf/requirements_ci.txt
            conf/requirements_ci_*.txt
            conf/conda_environment_ci.yaml
            conf/conda_environment_ci_*.yaml
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Security: Run security scans (Bandit, pip-audit)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit (SAST)
        run: |
          # Blocking check - fail on medium or higher severity
          bandit -r juniper_data_client -f txt --confidence-level medium --severity-level medium

      - name: Run pip-audit (Dependency Vulnerabilities)
        run: |
          pip install -e ".[test]"
          pip freeze | grep -ivE "^juniper[-_]data[-_]client" > reports/security/requirements.txt
          pip-audit -r reports/security/requirements.txt --strict

      - name: Upload Security Reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: security-reports
          path: reports/security/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Required Checks Aggregator: Final quality gate
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  required-checks:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, unit-tests, build, dependency-docs, security, docs]

    steps:
      - name: Check Quality Gate Status
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Quality Gate Status            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Lint:              ${{ needs.lint.result }}"
          echo "Unit Tests:        ${{ needs.unit-tests.result }}"
          echo "Build:             ${{ needs.build.result }}"
          echo "Dependency Docs:   ${{ needs.dependency-docs.result }}"
          echo "Security:          ${{ needs.security.result }}"
          echo "Documentation:     ${{ needs.docs.result }}"
          echo ""

          # Lint and unit-tests MUST pass
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint checks failed"
            exit 1
          fi

          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi

          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build failed"
            exit 1
          fi

          # Dependency docs: failure = error, skipped = OK
          if [[ "${{ needs.dependency-docs.result }}" == "failure" ]]; then
            echo "::error::Dependency documentation generation failed"
            exit 1
          fi

          # Security should pass
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::Security scans failed"
            exit 1
          fi

          # Documentation link validation must pass
          if [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "::error::Documentation link validation failed"
            exit 1
          fi

          echo "::notice::Quality Gate PASSED"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Notify Downstream: Trigger CI in dependent service repos (main push only)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  notify-downstream:
    name: Notify Downstream Repos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [required-checks]

    steps:
      - name: Dispatch to juniper-data
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pcalnon/juniper-data/dispatches \
            -d '{"event_type":"data-client-updated","client_payload":{"source":"juniper-data-client","sha":"${{ github.sha }}"}}'

      - name: Dispatch to juniper-cascor
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pcalnon/juniper-cascor/dispatches \
            -d '{"event_type":"data-client-updated","client_payload":{"source":"juniper-data-client","sha":"${{ github.sha }}"}}'

      - name: Dispatch to juniper-canopy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pcalnon/juniper-canopy/dispatches \
            -d '{"event_type":"data-client-updated","client_payload":{"source":"juniper-data-client","sha":"${{ github.sha }}"}}'
