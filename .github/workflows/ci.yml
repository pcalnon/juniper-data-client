---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   juniper-data-client
# Application:   juniper_data_client
# File Name:     ci.yml
# Author:        Paul Calnon
# Version:       0.3.0
#
# Date Created:  2026-02-20
# Last Modified: 2026-03-11
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    GitHub Actions CI/CD Pipeline for juniper-data-client
#    - Pre-commit hooks for code quality (black, isort, flake8, mypy, bandit, shellcheck, yamllint)
#    - Unit tests with coverage enforcement
#    - Security scanning (Gitleaks, Bandit SARIF, pip-audit)
#    - Build/package verification
#    - Dependency documentation generation
#    - Quality gate aggregator
#
# References:
#    - Modeled after juniper-cascor CI pipeline
#####################################################################################################################################################################################################

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_TEST_VERSION: "3.14"
  COVERAGE_FAIL_UNDER: "80"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Pre-commit: Code Quality Checks (runs across multiple Python versions)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  pre-commit:
    name: Pre-commit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Run pre-commit hooks
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Pre-commit Checks              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          pre-commit run --all-files --show-diff-on-failure

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Docs: Validate documentation link integrity
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  docs:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      # Wave 2 of the doc-link migration plan
      # (juniper-ml notes/JUNIPER_DOC_TOOLS_PYPI_MIGRATION_PLAN_2026-05-18.md):
      # the validator is installed from PyPI instead of run from the
      # inline scripts/check_doc_links.py copy. The inline copy stays in
      # place through Wave 4 so this swap remains a one-line revert.
      - name: Install juniper-doc-tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-doc-tools>=0.1.0,<0.2.0" "pyyaml>=6.0"

      - name: Validate Documentation Links
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Documentation Link Validation  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-check-doc-links \
            --exclude templates \
            --exclude history \
            --exclude legacy \
            --exclude pull_requests \
            --exclude releases \
            --exclude analysis \
            --exclude fixes \
            --exclude development \
            --exclude CHANGELOG.md \
            --cross-repo skip

      # Catches the failure class that broke 3 juniper-X CIs on
      # 2026-05-18: a workflow that invokes ``python|bash <path>`` after
      # the path was renamed or moved. Wave 4 of the dep-docs PyPI
      # migration (juniper-ml notes/JUNIPER_CI_TOOLS_PYPI_MIGRATION_PLAN_2026-05-20.md)
      # ships this lint as the ``juniper-lint-workflow-paths`` console
      # script in ``juniper-ci-tools>=0.2.0``; the inline byte-identical
      # copy at ``util/test_workflow_script_paths.py`` was deleted in
      # this PR. The shared tool discovers the repo root via a
      # ``.github/workflows/`` walk-up so it works out-of-the-box.
      - name: Install juniper-ci-tools (workflow-path + agents-md lints)
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-ci-tools>=0.2.0,<0.5.0"

      - name: Lint .github/workflows/ script paths
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Workflow script-path lint                            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-lint-workflow-paths

      # Pins AGENTS.md's `**Version**:` header to pyproject.toml's
      # [project].version so version bumps stay in sync with the
      # agent-facing contract. Shipped as the
      # ``juniper-lint-agents-md-version`` console script in
      # ``juniper-ci-tools>=0.3.0`` (juniper-ml#310); the inline
      # byte-identical copy at ``util/test_agents_md_version_drift.py``
      # was deleted in this PR.
      - name: Lint AGENTS.md version vs pyproject.toml
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       AGENTS.md version-drift lint                         ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-lint-agents-md-version

      # Pins AGENTS.md's header bullet block to the canonical six-field
      # schema (Project / Repository / Author / License / Version /
      # Last Updated, in that relative order). Currency of the
      # `**Last Updated**` field is maintained by the
      # `.github/workflows/agents-md-touch-up.yml` workflow (auto-bumps
      # on every PR push). Shipped as the
      # ``juniper-lint-agents-md-header`` console script in
      # ``juniper-ci-tools>=0.4.0`` (juniper-ml#319).
      - name: Lint AGENTS.md header schema
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       AGENTS.md header-schema lint                         ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-lint-agents-md-header

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Unit Tests: Run unit tests with coverage enforcement
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  unit-tests:
    # P-21 (cross-repo CI audit): align matrix with cascor / data /
    # cascor-worker / canopy by adding a macOS leg. Pure-Python HTTP
    # client — no platform-specific code paths — so the leg is a
    # consistency check rather than a smoke test for new code.
    name: Unit Tests + Coverage (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.12"

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Create required directories
        run: mkdir -p reports/junit reports/htmlcov

      - name: Run Unit Tests
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Unit Tests                     ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m pytest \
            tests/ \
            --verbose \
            --timeout=60 \
            --maxfail=5 \
            --junitxml=reports/junit/junit-unit.xml \
            --cov=juniper_data_client \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov

      - name: Enforce Coverage Gate
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Coverage Gate Enforcement      ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          python -m coverage report --fail-under=${COVERAGE_FAIL_UNDER}

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            reports/coverage.xml
            reports/htmlcov/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/junit/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Integration Tests: pytest -m integration on the full Python matrix
  # Alignment plan Phase 2 — additive only; soft-fail in required-checks
  # for the shakedown cycle.
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      - name: Create required directories
        run: mkdir -p reports/junit

      - name: Run Integration Tests (-m integration)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Integration Tests              ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          # If no tests are collected for the integration marker, pytest
          # exits with code 5; treat that as a clean skip rather than a
          # failure during the shakedown cycle.
          set +e
          python -m pytest \
            -m "integration" \
            tests/ \
            --verbose \
            --timeout=120 \
            --maxfail=5 \
            --junitxml=reports/junit/junit-integration.xml
          rc=$?
          set -e
          if [ "$rc" = "5" ]; then
            echo "::notice::No integration-marked tests collected — treating as skip."
            exit 0
          fi
          exit "$rc"

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: integration-test-results-py${{ matrix.python-version }}
          path: reports/junit/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Build: Build sdist and wheel artifacts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install build twine

      - name: Build sdist and wheel
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Build Package                  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          python -m build --sdist --wheel

      - name: Verify build artifacts
        run: |
          ls -la dist/
          test -f dist/*.tar.gz
          test -f dist/*.whl
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-artifacts
          path: dist/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Dependency Docs: Generate dependency documentation artifacts
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  dependency-docs:
    name: Dependency Documentation
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Set up Conda (Miniforge)
        uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5  # v4.0.1
        with:
          miniforge-version: latest
          auto-activate-base: true
          python-version: ${{ env.PYTHON_TEST_VERSION }}

      - name: Install project dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install -e ".[test]"

      # Wave 2 of the dep-docs PyPI migration -- replaces the inline
      # bash scripts/generate_dep_docs.sh with the juniper-ci-tools
      # console script from PyPI. See juniper-ml plan
      # notes/JUNIPER_CI_TOOLS_PYPI_MIGRATION_PLAN_2026-05-20.md.
      # The inline script will be removed in Wave 4.
      - name: Install juniper-ci-tools
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          pip install "juniper-ci-tools>=0.2.0,<0.5.0"

      - name: Generate Dependency Documentation
        shell: bash -l {0}
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Dependency Documentation       ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          juniper-generate-dep-docs

      - name: Upload Dependency Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dependency-docs
          path: |
            conf/requirements_ci.txt
            conf/requirements_ci_*.txt
            conf/conda_environment_ci.yaml
            conf/conda_environment_ci_*.yaml
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Security: Run security scans (Gitleaks, Bandit SARIF, pip-audit)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: [pre-commit]

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Secrets Detection)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action v2.3.9 ships as a Node.js 20 action.
          # GitHub forces Node 24 on 2026-06-02; opt in now to eliminate
          # the deprecation warning and ensure continued operation past
          # the cutover. Drop this once gitleaks-action publishes a
          # release pinned to node24 (upstream PR #215).
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        # gitleaks-action v2.3.9 has no `fail` input — passing it triggers
        # "Unexpected input(s) 'fail'" warnings in CI. The action exits
        # non-zero on leaks by default, which is the behavior we want.

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade "pip>=26.1.1"
          # ``[sarif]`` extra installs the optional SARIF formatter (jschema-to-python).
          pip install "bandit[sarif]" pip-audit

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit (SAST)
        # P-20 (cross-repo CI audit): mirror cascor / data's two-step
        # bandit pattern. Step 1 emits SARIF with --exit-zero so the
        # report always uploads; step 2 is the actual gate that fails
        # the job on medium-severity findings. Previously this step was
        # a single ``bandit … || true`` with no follow-up blocking
        # invocation, so any genuine finding was silently tolerated.
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Bandit Security Scan           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          # SARIF (always succeeds for upload).
          bandit -r juniper_data_client -f sarif -o reports/security/bandit.sarif --exit-zero
          # Blocking — fails on medium or higher.
          bandit -r juniper_data_client --confidence-level medium --severity-level medium

      - name: Upload Bandit SARIF to GitHub Security
        # ``hashFiles`` returns empty when the file is absent; only
        # attempt the upload when SARIF actually exists. Combined with
        # ``continue-on-error`` this keeps the job green even if a
        # security-tools regression prevents bandit from emitting the
        # file (mirrors the canonical pattern from juniper-data PR #67).
        if: always() && hashFiles('reports/security/bandit.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: reports/security/bandit.sarif
        continue-on-error: true

      - name: Run pip-audit (Dependency Vulnerabilities)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - pip-audit Dependency Scan      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          pip install -e ".[test]"
          pip freeze | grep -ivE "^juniper[-_]data[-_]client" > reports/security/requirements.txt
          pip-audit -r reports/security/requirements.txt --strict --desc on \
            || (echo "::error::Critical/High vulnerabilities found in dependencies" && exit 1)

      - name: Upload Security Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: security-reports
          path: reports/security/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Required Checks Aggregator: Final quality gate
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  required-checks:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [pre-commit, unit-tests, integration-tests, build, dependency-docs, security, docs]

    steps:
      - name: Check Quality Gate Status
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       juniper-data-client - Quality Gate Status            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Pre-commit:        ${{ needs.pre-commit.result }}"
          echo "Unit Tests:        ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Build:             ${{ needs.build.result }}"
          echo "Dependency Docs:   ${{ needs.dependency-docs.result }}"
          echo "Security:          ${{ needs.security.result }}"
          echo "Documentation:     ${{ needs.docs.result }}"
          echo ""

          # Pre-commit MUST pass
          if [[ "${{ needs.pre-commit.result }}" != "success" ]]; then
            echo "::error::Pre-commit checks failed"
            exit 1
          fi

          # Unit tests MUST pass
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi

          # Integration tests: soft-fail during the alignment-plan
          # shakedown cycle. Promote to a hard gate (`exit 1` on
          # failure) once the suite has stabilised.
          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "::warning::Integration tests failed (soft-fail shakedown cycle)"
          fi

          # Build MUST pass
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Build failed"
            exit 1
          fi

          # Dependency docs: failure = error, skipped = OK
          if [[ "${{ needs.dependency-docs.result }}" == "failure" ]]; then
            echo "::error::Dependency documentation generation failed"
            exit 1
          fi

          # Security should pass
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::error::Security scans failed"
            exit 1
          fi

          # Documentation link validation must pass
          if [[ "${{ needs.docs.result }}" != "success" ]]; then
            echo "::error::Documentation link validation failed"
            exit 1
          fi

          echo "::notice::Quality Gate PASSED"

  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  # Notify Downstream: Trigger CI in dependent service repos (main push only)
  # ═══════════════════════════════════════════════════════════════════════════════════════════════
  notify-downstream:
    name: Notify Downstream Repos
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [required-checks]

    steps:
      - name: Dispatch to juniper-data
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
