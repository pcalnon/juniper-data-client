---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperDataClient
# Application:   juniper_data_client
# File Name:     lockfile-update.yml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-05-02
# Last Modified: 2026-05-02
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Aligns juniper-data-client with the rest of the Juniper fleet's
#    Dependabot-push lockfile-management pattern. Triggers on push to a
#    `dependabot/pip/**` branch and regenerates `requirements.lock` (when
#    one exists in this repo) so transitive pins stay in sync with
#    pyproject.toml.
#
#    juniper-data-client is a CLIENT LIBRARY: it currently does NOT ship a
#    requirements.lock. Dependencies live as version ranges in
#    pyproject.toml because consumers pick concrete pins via their own
#    lockfiles. This workflow therefore exists primarily for fleet
#    structural consistency — the regenerate step is guarded on
#    `requirements.lock` actually being present in the repo, so the
#    workflow short-circuits cleanly when there's nothing to lock.
#
#    If the project later decides to ship a requirements.lock for CI
#    reproducibility, drop a seed lockfile into the repo root and this
#    workflow will start regenerating it on every Dependabot pip PR
#    automatically — no edits to this file required.
#
#    Uses CROSS_REPO_DISPATCH_TOKEN (not GITHUB_TOKEN) so the push re-
#    triggers CI on the Dependabot branch. See
#    juniper-ml/notes/V17_V18_CROSS_REPO_DISPATCH_TOKEN_SETUP_2026-05-02.md
#    for the secret-provisioning walkthrough.
#####################################################################################################################################################################################################

name: Update Lockfile (Dependabot)

on:
  push:
    branches:
      - dependabot/pip/**

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Update requirements.lock
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.11.8

      - name: Regenerate requirements.lock (if present)
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Data Client - Regenerate Lockfile            ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          if [ ! -f requirements.lock ]; then
            echo "::notice::No requirements.lock in this repo — skipping regeneration."
            echo "(juniper-data-client ships dependency ranges in pyproject.toml only;"
            echo " this workflow is a structural alignment with the rest of the fleet."
            echo " If a lockfile is added later, this step will start regenerating it"
            echo " automatically.)"
            exit 0
          fi

          # --upgrade is required because uv pip compile reads the existing -o
          # file as pins by default and won't bump transitive deps without it.
          uv pip compile pyproject.toml \
            --upgrade \
            -o requirements.lock

      - name: Commit updated lockfile
        run: |
          if [ ! -f requirements.lock ]; then
            echo "::notice::No requirements.lock to commit — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.lock
          if git diff --cached --quiet; then
            echo "::notice::Lockfile already up to date — no commit needed"
          else
            git commit -m "[dependabot skip] Update requirements.lock"
            git push
          fi
