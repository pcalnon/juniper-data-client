name: Scheduled Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]" pip-audit
          pip install -e ".[dev]"

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit (SAST)
        run: |
          bandit -r juniper_data_client -f sarif -o reports/security/bandit.sarif --exit-zero
          bandit -r juniper_data_client --confidence-level medium --severity-level medium

      - name: Run pip-audit (Dependency Vulnerabilities)
        run: pip-audit --strict --desc on

      - name: Upload Security Reports
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: security-reports
          path: reports/security/
          retention-days: 30
